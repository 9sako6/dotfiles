name: test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@bf2dc8e55639c1e091e9b45970152e4313705814
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    needs: secret-scan
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Verify secrets are absent before install
        run: test ! -e "$HOME/.zsh.d/secrets.zsh"

      - name: Run README install command
        run: curl -fsSL dot.9sako6.com | bash

      - name: Verify secrets are absent after install
        run: test ! -e "$HOME/.zsh.d/secrets.zsh"

      - name: Verify daily commands after install
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd "$HOME/dotfiles"
          mise run doctor
          mise run link:check
          mise run link
          mise run setup
          mise run test

      - name: Verify installed toolchain and daily-use tools
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd "$HOME/dotfiles"
          mise exec -- node --version
          mise exec -- pnpm --version
          mise exec -- bun --version
          mise exec -- zoxide --version
          mise exec -- atuin --version
          mise exec -- eza --version
          mise exec -- bat --version
          mise exec -- fd --version
          mise exec -- rg --version
          mise exec -- fzf --version
          mise exec -- gitleaks version
          mise exec -- ghq --version
          mise exec -- zellij --version
