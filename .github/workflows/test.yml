name: test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  contracts:
    needs: secret-scan
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Run contract tests
        run: mise run dev:test

  e2e:
    needs: secret-scan
    runs-on: macos-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Verify secrets are absent before install
        run: test ! -e "$HOME/.zsh.d/secrets.zsh"

      - name: Run README install command
        run: curl -fsSL dot.9sako6.com | bash

      - name: Verify secrets are absent after install
        run: test ! -e "$HOME/.zsh.d/secrets.zsh"

      - name: Verify dist-managed daily-use tools
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd "$HOME/dotfiles"
          mise exec -- node --version
          mise exec -- pnpm --version
          mise exec -- bun --version
          mise exec -- zoxide --version
          mise exec -- atuin --version
          mise exec -- eza --version
          mise exec -- bat --version
          mise exec -- fd --version
          mise exec -- rg --version
          mise exec -- fzf --version
          mise exec -- gitleaks version
          mise exec -- ghq --version
          mise exec -- zellij --version
