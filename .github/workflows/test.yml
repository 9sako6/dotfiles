name: test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -fsSLo gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        run: gitleaks git --redact --no-banner --exit-code 1

  contracts:
    needs: secret-scan
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Install pinned Git for config-based hooks
        run: |
          brew update
          if brew list git >/dev/null 2>&1; then
            brew upgrade git
          else
            brew install git
          fi
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          test "$(/opt/homebrew/bin/git --version)" = "git version 2.54.0"
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Verify pinned Git is active
        run: test "$(git --version)" = "git version 2.54.0"
      - name: Run contract tests
        run: mise run dev:test

  e2e:
    needs: secret-scan
    runs-on: macos-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Verify secrets are absent before install
        run: test ! -e "$HOME/.zsh.d/secrets.zsh"

      - name: Run README install command
        run: curl -fsSL dot.9sako6.com | bash

      - name: Verify secrets are absent after install
        run: test ! -e "$HOME/.zsh.d/secrets.zsh"

      - name: Verify dist-managed daily-use tools
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd "$HOME/dotfiles"
          mise exec -- node --version
          mise exec -- pnpm --version
          mise exec -- bun --version
          mise exec -- zoxide --version
          mise exec -- atuin --version
          mise exec -- eza --version
          mise exec -- fd --version
          mise exec -- rg --version
          mise exec -- fzf --version
          mise exec -- gitleaks version
          mise exec -- ghq --version
          mise exec -- zellij --version
