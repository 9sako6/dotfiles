name: test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@bf2dc8e55639c1e091e9b45970152e4313705814
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    needs: secret-scan
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install mise
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Trust repo
        run: mise trust
      - name: Install toolchain
        run: |
          mise install node pnpm bun
          echo "$HOME/.local/share/mise/installs/node/22.22.1/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/share/mise/installs/pnpm/10.32.1/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/share/mise/installs/bun/1.3.11/bin" >> "$GITHUB_PATH"
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: bun test
      - name: Dry-run link deployment
        run: |
          export HOME="$RUNNER_TEMP/home"
          mkdir -p "$HOME"
          bun run scripts/link-dist.ts --check
