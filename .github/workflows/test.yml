name: test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install mise
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Trust repo
        run: mise trust
      - name: Install toolchain
        run: mise install
      - name: Run tests
        run: mise run test
      - name: Dry-run link deployment
        run: |
          export HOME="$RUNNER_TEMP/home"
          mkdir -p "$HOME"
          mise trust
          mise run link:check
