[tools]
bun = "1.3.12"
node = "24.14.1"

[tasks."agents:build"]
dir = "{{config_root}}/dist"
run = [
  "apm compile --clean",
  "apm install",
  "apm compile --target claude --target codex",
  "mv AGENTS.md .codex/AGENTS.md",
  "rm CLAUDE.md",
  "rm .gitignore"
]
description = "Build agents resources via apm"

[tasks."install:user"]
run = [
  "brew bundle --file={{config_root}}/dist/.Brewfile",
  "MISE_GLOBAL_CONFIG_FILE={{config_root}}/dist/.config/mise/config.toml mise install",
]
description = "Install user tools from Brewfile and mise user config"

[tasks.apply]
run = "bun run scripts/link-dist.ts"
description = "Deploy dist/ into the home directory"

[tasks.plan]
run = "bun run scripts/link-dist.ts --check"
description = "Show planned deploy actions without changing the filesystem"

[tasks.setup]
depends = ["agents:build"]
run = "bun run scripts/setup.ts"
description = "Initial setup: deploy dist/, install user tools, and configure zinit"

[tasks."dev:test"]
run = "bun test"
description = "Run the dotfiles test suite"
