[tools]
bun = "1.3.12"
node = "24.14.1"

[tasks."agents:build"]
dir = "{{config_root}}/dist"
run = "bun run ../scripts/build-agents.ts"
description = "Build agents resources via apm"

[tasks."agents:install"]
dir = "{{config_root}}/dist"
run = "bun run ../scripts/build-agents.ts install"
description = "Install an agents skill via apm, then build agents resources"

[tasks."agents:update"]
dir = "{{config_root}}/dist"
run = "bun run ../scripts/build-agents.ts update"
description = "Update an agents skill via apm, then build agents resources"

[tasks."agents:uninstall"]
dir = "{{config_root}}/dist"
run = "bun run ../scripts/build-agents.ts uninstall"
description = "Uninstall an agents skill via apm, then build agents resources"

[tasks."install:user"]
depends = ["install:user:brew", "install:user:mise", "install:user:zinit"]
description = "Install user tools from deployed home-directory config"

[tasks."install:user:brew"]
run = "brew bundle --file=$HOME/.Brewfile"
description = "Install user Homebrew packages from ~/.Brewfile"

[tasks."install:user:mise"]
run = "cd $HOME && mise install"
description = "Install user-level mise tools from ~/.config/mise/config.toml"

[tasks."install:user:zinit"]
run = '''
set -eu

ZINIT_DIR="$HOME/.local/share/zinit/zinit.git"
if [ -e "$ZINIT_DIR/zinit.zsh" ]; then
  exit 0
fi

mkdir -p "$(dirname "$ZINIT_DIR")"
git init "$ZINIT_DIR"
git -C "$ZINIT_DIR" remote add origin https://github.com/zdharma-continuum/zinit.git
git -C "$ZINIT_DIR" fetch --depth=1 origin 55d19f86f627c9995db9885d0971d9b6701fe0d3
git -C "$ZINIT_DIR" checkout --detach FETCH_HEAD
'''
description = "Install zinit when it is not already present"

[tasks.apply]
run = "bun run scripts/link-dist.ts"
description = "Deploy dist/ into the home directory"

[tasks.plan]
run = "bun run scripts/link-dist.ts --check"
description = "Show planned deploy actions without changing the filesystem"

[tasks."dev:test"]
run = "bun test"
description = "Run the dotfiles test suite"
